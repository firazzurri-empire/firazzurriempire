<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIRAZZURRI EMPIRE | Empowering Progress</title>
  
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Load Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body { background-color: #020617; color: #cbd5e1; font-family: ui-sans-serif, system-ui, sans-serif; }
    ::selection { background-color: rgba(6, 182, 212, 0.3); }
    
    .glass-panel { 
      background: rgba(15, 23, 42, 0.6); 
      backdrop-filter: blur(12px); 
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05); 
    }
    
    .text-gradient { 
      background: linear-gradient(to right, #e2e8f0, #06b6d4); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
    }

    /* Scroll Animation Classes */
    .fade-in {
      opacity: 0;
      transition: all 0.8s cubic-bezier(0.17, 0.55, 0.55, 1);
    }
    .fade-in.up { transform: translateY(30px); }
    .fade-in.left { transform: translateX(-30px); }
    .fade-in.right { transform: translateX(30px); }
    .fade-in.visible {
      opacity: 1;
      transform: translate(0);
    }
  </style>
</head>
<body class="antialiased selection:bg-cyan-500/30">

  <nav id="navbar" class="fixed w-full z-50 transition-all duration-500 py-6 bg-transparent">

      <div class="flex items-center gap-3 cursor-pointer" onclick="scrollToId('home')">
        <img src="FirazzurriEmpire_logo_transparent.png" alt="FIRAZZURRI EMPIRE Logo" class="h-12 sm:h-16 w-auto object-contain drop-shadow-md" onerror="this.src='https://via.placeholder.com/150x50?text=F'" />

      </div>

      <div class="hidden md:flex gap-8 text-sm tracking-widest font-medium uppercase">
        <button onclick="scrollToId('about')" class="text-slate-200 hover:text-cyan-400 transition-colors">About</button>
        <button onclick="scrollToId('services')" class="text-slate-200 hover:text-cyan-400 transition-colors">Services</button>
        <button onclick="scrollToId('projects')" class="text-slate-200 hover:text-cyan-400 transition-colors">Projects</button>
        <button onclick="scrollToId('contact')" class="text-slate-200 hover:text-cyan-400 transition-colors">Contact</button>
      </div>

      <button id="menu-btn" class="md:hidden text-white cursor-pointer">

    </div>

      <button onclick="scrollToId('services')" class="text-left text-lg tracking-widest uppercase text-slate-200 hover:text-cyan-400 mt-4">Services</button>
      <button onclick="scrollToId('projects')" class="text-left text-lg tracking-widest uppercase text-slate-200 hover:text-cyan-400 mt-4">Projects</button>
      <button onclick="scrollToId('contact')" class="text-left text-lg tracking-widest uppercase text-slate-200 hover:text-cyan-400 mt-4">Contact</button>
    </div>
  </nav>
