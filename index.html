<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    html { scroll-behavior: smooth; }

<body class="bg-slate-950 text-slate-300 font-sans selection:bg-cyan-500/30">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      Menu, X, ChevronRight, Briefcase, Monitor, Wrench, 
      Hammer, ShoppingBag, Mail, MapPin, Phone, ArrowRight,
      ShieldCheck, Award, Building
    } from 'https://esm.sh/lucide-react@0.344.0';

    // --- CUSTOM HOOK FOR SCROLL ANIMATIONS ---
    const useIntersectionObserver = (options = {}) => {
      const [isIntersecting, setIsIntersecting] = useState(false);
      const ref = useRef(null);

      useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            setIsIntersecting(true);
            observer.unobserve(entry.target);
          }
        }, { threshold: 0.1, ...options });

        if (ref.current) observer.observe(ref.current);
        return () => { if (ref.current) observer.unobserve(ref.current); };
      }, [options]);

      return [ref, isIntersecting];
    };

    const FadeIn = ({ children, delay = 0, direction = 'up', className = '' }) => {
      const [ref, isVisible] = useIntersectionObserver();
      
      const getTransform = () => {
        switch (direction) {
          case 'up': return 'translateY(30px)';
          case 'down': return 'translateY(-30px)';
          case 'left': return 'translateX(-30px)';
          case 'right': return 'translateX(30px)';
          default: return 'translateY(0)';
        }
      };

      const style = {
        opacity: isVisible ? 1 : 0,
        transform: isVisible ? 'translate(0)' : getTransform(),
        transition: `all 0.8s cubic-bezier(0.17, 0.55, 0.55, 1) ${delay}s`,
      };

      return <div ref={ref} style={style} className={className}>{children}</div>;
    };

    // --- DATA FROM PDF ---
    const SERVICES = [
      { title: 'Office & Stationery Supplies', icon: <Briefcase size={28} className="text-cyan-400" />, description: 'Comprehensive office essentials, equipment, furniture, and customized corporate items to ensure smooth daily operations.' },

      { title: 'Maintenance & Facility', icon: <Wrench size={28} className="text-cyan-400" />, description: 'Routine office maintenance, electrical, plumbing, and cleaning services ensuring a safe and professional environment.' },
      { title: 'Renovation Works', icon: <Hammer size={28} className="text-cyan-400" />, description: 'Tailored small-scale renovation, layout partitioning, flooring, and structural improvements for modern workspaces.' },
      { title: 'General Trading', icon: <ShoppingBag size={28} className="text-cyan-400" />, description: 'Customized sourcing for diverse client needs including PPE, corporate gifts, and specialized procurement.' },
    ];

    const PROJECTS = [
      { client: 'Majlis Bandaraya Pulau Pinang (MBPP)', scope: 'Supply of operational, cleaning, and safety equipment for municipal operations.', image: 'https://images.unsplash.com/photo-1577717903315-1691ae25ab3f?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80' },
      { client: 'Jabatan Insolvensi Malaysia', scope: 'Supply of office consumables, filing accessories, and operational support items.', image: 'https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80' },
      { client: 'Jabatan Penerangan Malaysia', scope: 'Delivery of essential office and operational items required for daily administrative activities.', image: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80' }
    ];

    function App() {
      const [isScrolled, setIsScrolled] = useState(false);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

      useEffect(() => {
        const handleScroll = () => setIsScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const scrollTo = (id) => {
        setMobileMenuOpen(false);
        const element = document.getElementById(id);
        if (element) element.scrollIntoView({ behavior: 'smooth' });

      return (
        <div className="min-h-screen">

                <button onClick={() => scrollTo('projects')} className="text-slate-200 hover:text-cyan-400 transition-colors">Projects</button>
                <button onClick={() => scrollTo('contact')} className="text-slate-200 hover:text-cyan-400 transition-colors">Contact</button>
              </div>
              <button className="md:hidden text-white" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                {mobileMenuOpen ? <X size={28} /> : <Menu size={28} />}
              </button>
            </div>
            {mobileMenuOpen && (
              <div className="absolute top-full left-0 w-full glass-panel flex flex-col py-6 px-6 gap-6 md:hidden border-t border-white/10">
                {['about', 'services', 'projects', 'contact'].map((item) => (
                  <button key={item} onClick={() => scrollTo(item)} className="text-left text-lg tracking-widest uppercase text-slate-200 hover:text-cyan-400">{item}</button>

          {/* --- HERO SECTION --- */}

            <div className="relative z-10 max-w-7xl mx-auto px-6 lg:px-12 w-full">

                  </h2>
                  <p className="text-slate-300 text-lg leading-relaxed mb-6">
                    Established in October 2025, FIRAZZURRI EMPIRE (003784056-D) is a premier trading and service provider strategically positioned to deliver innovative solutions. Operating actively from Pulau Pinang, our foundation is built on integrity, quality, and rigorous professionalism.

                  <div className="flex flex-col gap-4 mt-10">
                    <div className="flex items-start gap-4">

                      <div>
                        <h4 className="text-white font-semibold tracking-wide">Government Recognized</h4>

                      </div>
                    </div>
                    <div className="flex items-start gap-4">
                      <div className="p-3 glass-panel rounded-lg text-cyan-400"><Building size={24} /></div>
                      <div>
                        <h4 className="text-white font-semibold tracking-wide">End-to-End Solutions</h4>
                        <p className="text-slate-400 text-sm mt-1">From high-end IT infrastructure to complete office renovations.</p>
                      </div>
                    </div>
                  </div>
                </FadeIn>
                <FadeIn direction="right" delay={0.2} className="relative">
                  <div className="absolute inset-0 bg-cyan-500/5 translate-x-4 translate-y-4 rounded-xl"></div>
                  <div className="glass-panel p-8 md:p-12 relative rounded-xl border border-white/10">
                    <div className="mb-8">
                      <h3 className="text-xl text-white font-semibold mb-2">Welcome Message</h3>
                      <div className="h-1 w-12 bg-cyan-400 mb-6"></div>
                      <p className="text-slate-300 italic font-light leading-relaxed">
                        "At FIRAZZURRI EMPIRE, we believe in building long-term relationships based on integrity, professionalism, and commitment to excellence. We understand that every client has unique needs, and our mission is to deliver tailored solutions that add value and contribute to their success."
                      </p>
                    </div>
                    <div className="flex items-center gap-4">

                      <div>
                        <p className="text-white font-semibold tracking-wide">Mohamad Firdaus Bin Samsuddin</p>
                        <p className="text-cyan-400 text-sm tracking-wider uppercase">Founder & CEO</p>
                      </div>
                    </div>
                  </div>
                </FadeIn>
              </div>
            </div>

                </div>
              </FadeIn>
              <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                {SERVICES.map((service, index) => (
                  <FadeIn key={index} delay={index * 0.1} direction="up">

            </div>
          </section>

          {/* --- PAST PROJECTS SECTION --- */}
          <section id="projects" className="py-24 lg:py-32">
            <div className="max-w-7xl mx-auto px-6 lg:px-12">
              <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-6">
                <FadeIn direction="right">
                  <h2 className="text-sm tracking-[0.3em] text-cyan-400 uppercase font-semibold mb-4">Proven Track Record</h2>
                  <h3 className="text-3xl md:text-5xl font-light text-white">Trusted by the Best</h3>
                </FadeIn>
              </div>
              <div className="grid md:grid-cols-3 gap-8">
                {PROJECTS.map((project, index) => (
                  <FadeIn key={index} delay={index * 0.2} direction="up">
                    <div className="group relative overflow-hidden rounded-xl aspect-[4/5] glass-panel cursor-pointer border border-white/5 hover:border-cyan-400/30 transition-colors">
                      <img src={project.image} alt={project.client} className="absolute inset-0 w-full h-full object-cover opacity-40 mix-blend-luminosity group-hover:mix-blend-normal group-hover:opacity-30 transition-all duration-700 group-hover:scale-105" />

                      <div className="absolute inset-0 p-8 flex flex-col justify-end transform transition-transform duration-500 group-hover:translate-y-0 translate-y-8">
                        <h4 className="text-2xl text-white font-semibold mb-3">{project.client}</h4>
                        <p className="text-slate-300 text-sm leading-relaxed mb-6 opacity-0 group-hover:opacity-100 transition-opacity duration-500 delay-100">{project.scope}</p>
                        <div className="flex items-center gap-2 text-cyan-400 text-sm font-semibold tracking-widest uppercase">View Details <ChevronRight size={16} /></div>
                      </div>
                    </div>
                  </FadeIn>
                ))}
              </div>
            </div>
          </section>

          {/* --- CONTACT SECTION --- */}
          <section id="contact" className="py-24 lg:py-32 relative border-t border-white/5 bg-slate-950">
            <div className="max-w-7xl mx-auto px-6 lg:px-12">
              <div className="grid lg:grid-cols-2 gap-16">
                <FadeIn direction="left">
                  <h2 className="text-4xl md:text-6xl font-light text-white mb-8">
                    Let's Build The <br/><span className="text-cyan-400 font-semibold">Future Together.</span>
                  </h2>
                  <p className="text-slate-300 text-lg mb-12 max-w-md font-light">Whether you're looking for procurement solutions, IT infrastructure, or facility maintenance, we are ready to elevate your operations.</p>
                  <div className="space-y-8">
                    <div className="flex items-start gap-4">
                      <div className="p-3 bg-slate-900 text-cyan-400 rounded flex-shrink-0 border border-white/5"><MapPin size={24} /></div>
                      <div>
                        <h4 className="text-white font-semibold uppercase tracking-widest text-sm mb-1">Headquarters</h4>
                        <p className="text-slate-400 font-light">Block 306-2-12A, Taman Jelutong,<br/>11600 Jelutong, Pulau Pinang</p>

                    <div className="flex items-start gap-4">
                      <div className="p-3 bg-slate-900 text-cyan-400 rounded flex-shrink-0 border border-white/5"><Phone size={24} /></div>
                      <div>
                        <h4 className="text-white font-semibold uppercase tracking-widest text-sm mb-1">Direct Line</h4>

                      <div>
                        <h4 className="text-white font-semibold uppercase tracking-widest text-sm mb-1">Email Inquiry</h4>
                        <a href="mailto:firazzurri@gmail.com" className="text-slate-400 font-light hover:text-cyan-400 transition-colors">firazzurri@gmail.com</a>

                  <div className="glass-panel p-8 md:p-12 rounded-xl border border-white/10">
